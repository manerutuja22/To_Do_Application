{% extends "tasks/base.html" %}

{% block content %}

<h2 class="text-center mb-4">Update Task</h2>

<form method="POST">

{% csrf_token %}

<input 
type="text"
name="title"
class="form-control mb-3"
value="{{ task.title }}"
required
>

<button class="btn btn-primary">
Update Task
</button>

<a href="/" class="btn btn-secondary">
Cancel
</a>

</form>

{% endblock %}
