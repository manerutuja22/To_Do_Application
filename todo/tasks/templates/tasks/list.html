<h1>Todo List</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Enter task">
    <button type="submit">Add Task</button>
</form>

<hr>

<ul>
{% for task in tasks %}
    <li>
        {{ task.title }}
        {% if task.completed %}
            ✔
        {% endif %}
    </li>
{% endfor %}
</ul>
