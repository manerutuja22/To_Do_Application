<!DOCTYPE html>
<html>

<head>

<title>Todo App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:linear-gradient(135deg,#89f7fe,#66a6ff);">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">My Todo List</h2>

<form method="POST" class="d-flex gap-2 mb-4">

{% csrf_token %}

<input 
type="text"
name="title"
class="form-control"
placeholder="Enter new task"
required
>

<button class="btn btn-primary">
Add Task
</button>

</form>

<ul class="list-group">

{% for task in tasks %}

<li class="list-group-item mb-3">

{% if task.completed %}
<h5 class="text-muted text-decoration-line-through">
{{ task.title }}
</h5>
{% else %}
<h5 class="text-dark">
{{ task.title }}
</h5>
{% endif %}

<div class="mt-2">

{% if not task.completed %}
<a href="/complete/{{ task.id }}" class="btn btn-success btn-sm">
Complete
</a>
{% endif %}

<a href="/update/{{ task.id }}" class="btn btn-primary btn-sm">
Update
</a>

<a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm">
Delete
</a>

</div>

</li>

{% endfor %}

</ul>

</div>

</div>

</body>

</html>
